# Publica el build de Vite en la carpeta docs/ sobre main.
# En GitHub: Settings → Pages → Deploy from branch → Branch: main, Folder: /docs
#
# paths-ignore evita bucles cuando el deploy solo commitea docs/**.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and build
        env:
          VITE_BASE_URL: /acompa-ar/
        run: |
          npm ci
          npm run build

      - name: SPA fallback (refresco en rutas internas)
        run: cp dist/index.html dist/404.html

      - name: Publicar dist → docs/ en main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          target-folder: docs
          commit-message: 'chore: deploy Pages → docs/'
